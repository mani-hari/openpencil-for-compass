<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>UXC ↔ OpenPencil Harness</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: grid;
        grid-template-columns: 420px 1fr;
        height: 100vh;
        background: #0b0d10;
        color: #e6e9ef;
      }
      .panel {
        border-right: 1px solid #222;
        padding: 16px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 { font-size: 16px; margin: 0 0 4px; }
      p.hint { margin: 0; font-size: 12px; color: #8a94a7; }
      label { font-size: 12px; color: #8a94a7; display: block; margin-bottom: 4px; }
      input, textarea, select {
        width: 100%;
        background: #15181d;
        color: #e6e9ef;
        border: 1px solid #2a2f38;
        border-radius: 6px;
        padding: 8px;
        font: inherit;
      }
      textarea { min-height: 120px; resize: vertical; font-family: ui-monospace, monospace; font-size: 12px; }
      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
      button {
        background: #4f46e5;
        color: white;
        border: 0;
        border-radius: 6px;
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }
      button.secondary { background: #2a2f38; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .log {
        flex: 1;
        min-height: 160px;
        background: #070809;
        border: 1px solid #2a2f38;
        border-radius: 6px;
        padding: 8px;
        font: 11px ui-monospace, monospace;
        overflow: auto;
        white-space: pre-wrap;
      }
      .log .out { color: #7dd3fc; }
      .log .in { color: #a7f3d0; }
      .log .err { color: #fca5a5; }
      iframe { border: 0; width: 100%; height: 100%; background: white; }
    </style>
  </head>
  <body>
    <div class="panel">
      <div>
        <h1>UXC Harness</h1>
        <p class="hint">
          Simulates UX Compass talking to OpenPencil via <code>postMessage</code>.
          Serve this file from <code>http://localhost:3002</code> so the origin
          matches the default allowlist.
        </p>
      </div>

      <div>
        <label for="iframeSrc">Iframe src</label>
        <input id="iframeSrc" value="http://localhost:3000/editor" />
      </div>

      <div>
        <label for="requestId">Request ID</label>
        <input id="requestId" />
      </div>

      <div>
        <label for="prompt">Prompt</label>
        <textarea id="prompt">Design a Cloud SQL instances list screen with a header, a filter row, and a table of 6 instances. Use Google Cloud console styling.</textarea>
      </div>

      <div>
        <label for="digest">Blueprint digest (optional)</label>
        <textarea id="digest" placeholder="Optional flat-string summary of the structured blueprint"></textarea>
      </div>

      <div class="row">
        <button id="btnGenerate">Send uxc:generate</button>
        <button id="btnCancel" class="secondary">Cancel</button>
      </div>
      <div class="row">
        <button id="btnHello" class="secondary">Send uxc:hello</button>
        <button id="btnClear" class="secondary">Clear log</button>
      </div>

      <div>
        <label>Event log</label>
        <div id="log" class="log"></div>
      </div>
    </div>

    <iframe id="op" src="http://localhost:3000/editor" allow="clipboard-read; clipboard-write"></iframe>

    <script>
      const $ = (id) => document.getElementById(id)
      const iframe = $('op')
      const log = $('log')

      function uid() {
        return 'req_' + Math.random().toString(36).slice(2, 10)
      }

      function writeLog(kind, data) {
        const div = document.createElement('div')
        div.className = kind
        const time = new Date().toLocaleTimeString()
        div.textContent = `[${time}] ${kind.toUpperCase()}  ` + JSON.stringify(data)
        log.appendChild(div)
        log.scrollTop = log.scrollHeight
      }

      function post(msg) {
        iframe.contentWindow?.postMessage(msg, '*')
        writeLog('out', msg)
      }

      $('requestId').value = uid()

      $('iframeSrc').addEventListener('change', (e) => {
        iframe.src = e.target.value
      })

      $('btnGenerate').addEventListener('click', () => {
        const requestId = $('requestId').value.trim() || uid()
        $('requestId').value = requestId
        const prompt = $('prompt').value
        const blueprintDigest = $('digest').value.trim() || undefined
        post({
          type: 'uxc:generate',
          version: 1,
          requestId,
          prompt,
          blueprintDigest,
          context: {
            product: 'Cloud SQL',
            page: 'Instances',
            route: '/sql/instances',
            surface: 'console',
            feature: 'instance-list',
            interventionFocus: 'harness-test',
          },
        })
      })

      $('btnCancel').addEventListener('click', () => {
        post({ type: 'uxc:cancel', requestId: $('requestId').value })
      })

      $('btnHello').addEventListener('click', () => {
        post({ type: 'uxc:hello', version: 1 })
      })

      $('btnClear').addEventListener('click', () => {
        log.innerHTML = ''
      })

      window.addEventListener('message', (event) => {
        const data = event.data
        if (!data || typeof data !== 'object') return
        if (typeof data.type !== 'string' || !data.type.startsWith('uxc:')) return
        writeLog('in', data)
      })
    </script>
  </body>
</html>
